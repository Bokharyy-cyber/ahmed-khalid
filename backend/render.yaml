services:
  - type: web
    name: bokhary-portfolio-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bokhary-db
          property: connectionString
      - key: GMAIL_USER
        sync: false          # enter manually in Render dashboard
      - key: GMAIL_APP_PASSWORD
        sync: false          # enter manually in Render dashboard
      - key: OWNER_EMAIL
        value: ahmed8khale162d6@gmail.com

databases:
  - name: bokhary-db
    databaseName: bokhary
    user: bokhary
